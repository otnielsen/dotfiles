set -g default-command "${SHELL}"
set -as terminal-features ",alacritty*:RGB:hyperlinks"
set -g history-limit 10000
set -g renumber-windows on
set -g status-position top
set -g status-justify absolute-centre
set -g status-right ""
set -g status-left ""
set -g status-style "bg=terminal fg=cyan"

bind c new-window -ac "#{pane_current_path}"
bind % split-window -hc "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"

bind Enter run-shell -b "TMUX= SHELL=${SHELL} setsid --fork alacritty --working-directory #{pane_current_path}"

bind -T copy-mode-vi [ send-keys -X previous-prompt
bind -T copy-mode-vi ] send-keys -X next-prompt

set -g status off
set-hook -g window-linked "if -F '#{==:#{session_windows},2}' 'set status on'"
set-hook -g window-unlinked "if -F '#{==:#{session_windows},1}' 'set status off'"
