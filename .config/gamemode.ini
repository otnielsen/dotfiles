[general]
desiredgov=powersave

[custom]
start=scxctl switch --mode gaming
      pkexec /usr/local/libexec/gamemode-epp.sh gaming
      busctl --user -q call org.kde.KWin /Effects org.kde.kwin.Effects loadEffect s hidecursor
end=scxctl switch --mode auto
    pkexec /usr/local/libexec/gamemode-epp.sh default
    busctl --user -q call org.kde.KWin /Effects org.kde.kwin.Effects unloadEffect s hidecursor
